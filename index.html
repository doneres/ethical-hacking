<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ctrl+Play — Ethical Hacking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --orange: #f26522;
        --orange-dim: rgba(242, 101, 34, 0.15);
        --orange-glow: rgba(242, 101, 34, 0.4);
        --bg: #080a0e;
        --surface: #0f1218;
        --border: rgba(242, 101, 34, 0.2);
        --text: #e8e8e8;
        --muted: #555c6b;
        --mono: "JetBrains Mono", monospace;
        --display: "Syne", sans-serif;
        --body: "Inter", sans-serif;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: var(--body);
        overflow: hidden;
        user-select: none;
      }

      /* ── CANVAS DE FUNDO ── */
      #bg-canvas {
        position: fixed;
        inset: 0;
        z-index: 0;
      }

      /* ── SCANLINE ── */
      .scanline {
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        background: repeating-linear-gradient(
          to bottom,
          transparent 0px,
          transparent 3px,
          rgba(0, 0, 0, 0.08) 3px,
          rgba(0, 0, 0, 0.08) 4px
        );
      }

      /* ── VINHETA ── */
      .vignette {
        position: fixed;
        inset: 0;
        z-index: 2;
        pointer-events: none;
        background: radial-gradient(
          ellipse at center,
          transparent 40%,
          rgba(0, 0, 0, 0.7) 100%
        );
      }

      /* ── LAYOUT PRINCIPAL ── */
      .screen {
        position: relative;
        z-index: 10;
        width: 100vw;
        height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr auto;
        padding: 36px 48px;
      }

      /* ── TOPBAR ── */
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .logo-wrap {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .logo-icon {
        width: 40px;
        height: 40px;
        background: var(--orange);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .logo-icon svg {
        width: 22px;
        height: 22px;
      }
      .logo-text {
        font-family: var(--display);
        font-size: 20px;
        font-weight: 800;
        color: #fff;
        letter-spacing: -0.3px;
      }
      .logo-text span {
        color: var(--orange);
      }
      .logo-sub {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-top: 2px;
      }

      .status-pill {
        display: flex;
        align-items: center;
        gap: 8px;
        border: 1px solid var(--border);
        background: var(--orange-dim);
        padding: 8px 16px;
        border-radius: 6px;
        font-family: var(--mono);
        font-size: 12px;
        color: var(--orange);
        letter-spacing: 1px;
      }
      .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--orange);
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.4;
          transform: scale(0.8);
        }
      }

      /* ── CENTRO ── */
      .center {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 0;
      }

      .day-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: var(--orange-dim);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 6px 16px;
        font-family: var(--mono);
        font-size: 12px;
        font-weight: 700;
        color: var(--orange);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 28px;
      }
      .day-badge svg {
        width: 13px;
        height: 13px;
      }

      .main-title {
        font-family: var(--display);
        font-size: clamp(52px, 7vw, 96px);
        font-weight: 800;
        line-height: 1;
        letter-spacing: -2px;
        color: #fff;
        margin-bottom: 6px;
      }
      .main-title .accent {
        color: var(--orange);
      }

      .sub-title {
        font-family: var(--display);
        font-size: clamp(18px, 2.5vw, 32px);
        font-weight: 700;
        color: var(--muted);
        letter-spacing: -0.5px;
        margin-bottom: 40px;
      }

      .divider-line {
        width: 64px;
        height: 2px;
        background: var(--orange);
        border-radius: 2px;
        margin: 0 auto 40px;
        box-shadow: 0 0 12px var(--orange-glow);
      }

      .course-info {
        display: flex;
        align-items: center;
        gap: 48px;
      }
      .info-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }
      .info-label {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--muted);
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      .info-value {
        font-family: var(--display);
        font-size: 18px;
        font-weight: 700;
        color: #fff;
      }
      .info-sep {
        width: 1px;
        height: 40px;
        background: rgba(255, 255, 255, 0.08);
      }

      /* ── TERMINAL BOTTOM ── */
      .terminal-strip {
        background: rgba(15, 18, 24, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 8px;
        padding: 14px 20px;
        font-family: var(--mono);
        font-size: 13px;
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: 48px;
      }
      .terminal-prompt {
        color: var(--orange);
      }
      .terminal-text {
        color: #fff;
      }
      .terminal-cursor {
        display: inline-block;
        width: 8px;
        height: 16px;
        background: var(--orange);
        vertical-align: middle;
        animation: blink 1s step-end infinite;
        margin-left: 2px;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }

      /* ── RODAPÉ ── */
      .footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .footer-left {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 1px;
      }
      .clock {
        font-family: var(--mono);
        font-size: 28px;
        font-weight: 700;
        color: #fff;
        letter-spacing: 2px;
      }
      .clock-date {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        text-align: right;
        letter-spacing: 1px;
        margin-top: 4px;
      }

      /* ── CORNER DECORATIONS ── */
      .corner {
        position: fixed;
        width: 40px;
        height: 40px;
        z-index: 5;
        pointer-events: none;
      }
      .corner--tl {
        top: 20px;
        left: 20px;
        border-top: 2px solid var(--orange);
        border-left: 2px solid var(--orange);
      }
      .corner--tr {
        top: 20px;
        right: 20px;
        border-top: 2px solid var(--orange);
        border-right: 2px solid var(--orange);
      }
      .corner--bl {
        bottom: 20px;
        left: 20px;
        border-bottom: 2px solid var(--orange);
        border-left: 2px solid var(--orange);
      }
      .corner--br {
        bottom: 20px;
        right: 20px;
        border-bottom: 2px solid var(--orange);
        border-right: 2px solid var(--orange);
      }
    </style>
  </head>
  <body>
    <canvas id="bg-canvas"></canvas>
    <div class="scanline"></div>
    <div class="vignette"></div>

    <!-- CANTOS DECORATIVOS -->
    <div class="corner corner--tl"></div>
    <div class="corner corner--tr"></div>
    <div class="corner corner--bl"></div>
    <div class="corner corner--br"></div>

    <div class="screen">
      <!-- TOPO -->
      <div class="topbar">
        <div class="logo-wrap">
          <div class="logo-icon">
            <svg
              viewBox="0 0 22 22"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path d="M3 11L9 5V8H15V14H9V17L3 11Z" fill="white" />
              <rect
                x="17"
                y="5"
                width="2.5"
                height="12"
                rx="1.25"
                fill="white"
              />
            </svg>
          </div>
          <div>
            <div class="logo-text"><span>Ctrl+</span>Play Goiânia</div>
            <div class="logo-sub">Escola de Programação e Robótica</div>
          </div>
        </div>
        <div class="status-pill">
          <div class="status-dot"></div>
          SESSÃO ATIVA
        </div>
      </div>

      <!-- CENTRO -->
      <div class="center">
        <div class="day-badge">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
          </svg>
          Curso de Férias &nbsp;·&nbsp; Dia 01 de 05
        </div>

        <div class="main-title">
          Ethical<br /><span class="accent">Hacking</span>
        </div>
        <div class="sub-title">Introdução ao Hacking Ético</div>

        <div class="divider-line"></div>

        <div class="course-info">
          <div class="info-item">
            <span class="info-label">Duração</span>
            <span class="info-value">5 Dias · 20h</span>
          </div>
          <div class="info-sep"></div>
          <div class="info-item">
            <span class="info-label">Modalidade</span>
            <span class="info-value">Presencial</span>
          </div>
          <div class="info-sep"></div>
          <div class="info-item">
            <span class="info-label">Instrutor</span>
            <span class="info-value">Douglas</span>
          </div>
          <div class="info-sep"></div>
          <div class="info-item">
            <span class="info-label">Horário</span>
            <span class="info-value">14h — 17h</span>
          </div>
        </div>

        <div class="terminal-strip">
          <span class="terminal-prompt">root@ctrlplay:~$</span>
          <span class="terminal-text" id="typed-text"></span>
          <span class="terminal-cursor"></span>
        </div>
      </div>

      <!-- RODAPÉ -->
      <div class="footer">
        <div class="footer-left">
          CTRL+PLAY GOIÂNIA &nbsp;·&nbsp; ETHICAL HACKING BOOTCAMP 2025
        </div>
        <div>
          <div class="clock" id="clock">00:00:00</div>
          <div class="clock-date" id="clock-date"></div>
        </div>
      </div>
    </div>

    <script>
      // ── RELÓGIO ──
      function updateClock() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, "0");
        const m = String(now.getMinutes()).padStart(2, "0");
        const s = String(now.getSeconds()).padStart(2, "0");
        document.getElementById("clock").textContent = `${h}:${m}:${s}`;

        const days = [
          "Domingo",
          "Segunda-feira",
          "Terça-feira",
          "Quarta-feira",
          "Quinta-feira",
          "Sexta-feira",
          "Sábado",
        ];
        const months = [
          "Jan",
          "Fev",
          "Mar",
          "Abr",
          "Mai",
          "Jun",
          "Jul",
          "Ago",
          "Set",
          "Out",
          "Nov",
          "Dez",
        ];
        document.getElementById("clock-date").textContent =
          `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
      }
      updateClock();
      setInterval(updateClock, 1000);

      // ── TYPING ANIMATION ──
      const messages = [
        "inicializando ambiente de laboratório...",
        "carregando ferramentas: nmap, wireshark, burp...",
        "verificando máquinas virtuais...",
        "bem-vindo ao curso de ethical hacking.",
      ];
      let msgIdx = 0,
        charIdx = 0,
        deleting = false;
      const el = document.getElementById("typed-text");
      function type() {
        const msg = messages[msgIdx];
        if (!deleting) {
          el.textContent = msg.slice(0, ++charIdx);
          if (charIdx === msg.length) {
            deleting = true;
            setTimeout(type, 2200);
            return;
          }
          setTimeout(type, 42);
        } else {
          el.textContent = msg.slice(0, --charIdx);
          if (charIdx === 0) {
            deleting = false;
            msgIdx = (msgIdx + 1) % messages.length;
            setTimeout(type, 400);
            return;
          }
          setTimeout(type, 18);
        }
      }
      setTimeout(type, 800);

      // ── CANVAS BACKGROUND (rede de pontos) ──
      const canvas = document.getElementById("bg-canvas");
      const ctx = canvas.getContext("2d");
      let W,
        H,
        dots = [];

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        dots = [];
        const count = Math.floor((W * H) / 14000);
        for (let i = 0; i < count; i++) {
          dots.push({
            x: Math.random() * W,
            y: Math.random() * H,
            vx: (Math.random() - 0.5) * 0.25,
            vy: (Math.random() - 0.5) * 0.25,
            r: Math.random() * 1.5 + 0.5,
          });
        }
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);
        const MAX_DIST = 140;

        for (let d of dots) {
          d.x += d.vx;
          d.y += d.vy;
          if (d.x < 0 || d.x > W) d.vx *= -1;
          if (d.y < 0 || d.y > H) d.vy *= -1;
          ctx.beginPath();
          ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
          ctx.fillStyle = "rgba(242,101,34,0.25)";
          ctx.fill();
        }

        for (let i = 0; i < dots.length; i++) {
          for (let j = i + 1; j < dots.length; j++) {
            const dx = dots[i].x - dots[j].x;
            const dy = dots[i].y - dots[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < MAX_DIST) {
              const alpha = (1 - dist / MAX_DIST) * 0.12;
              ctx.beginPath();
              ctx.moveTo(dots[i].x, dots[i].y);
              ctx.lineTo(dots[j].x, dots[j].y);
              ctx.strokeStyle = `rgba(242,101,34,${alpha})`;
              ctx.lineWidth = 0.8;
              ctx.stroke();
            }
          }
        }
        requestAnimationFrame(draw);
      }

      resize();
      draw();
      window.addEventListener("resize", resize);
    </script>
  </body>
</html>
